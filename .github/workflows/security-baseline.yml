name: Security Baseline

# Scans this repo for known-vulnerable + known-malicious dependencies on every
# push to default branch, every PR, and weekly. Findings appear in the repo's
# Security tab (Code Scanning). Maintained by jottavia/sec-scanner.
#
# Auto-updated via Dependabot (.github/dependabot.yml).

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: osv-scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863  # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@75ed5c20bee1b46f5a72c64a228d62b1f8676e98  # v2.0.2
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda  # v3.27.0
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
