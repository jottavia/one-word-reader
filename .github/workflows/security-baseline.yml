name: Security Baseline

# Scans this repo for known-vulnerable + known-malicious dependencies on every
# push to default branch, every PR, and weekly. Findings appear in the repo's
# Security tab (public repos) or as workflow artifacts (private repos without GHAS).
# Maintained by jottavia/sec-scanner.

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: osv-scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863  # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        # Free on public repos; private personal repos need GHAS - soft-fail if unavailable.
        if: always() && hashFiles('osv-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda  # v3.27.0
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      - name: Upload scan result as artifact
        # Always uploads as artifact - works on private repos without GHAS.
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: osv-results
          path: osv-results.sarif
          if-no-files-found: ignore
          retention-days: 30
