name: Security Baseline

# Scans this repo for known-vulnerable + known-malicious dependencies on every
# push to default branch, every PR, and weekly. Findings appear in the repo's
# Security tab (public repos) or as workflow artifacts (private repos without GHAS).
# Maintained by jottavia/sec-scanner.

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: osv-scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        # Free on public repos; private personal repos need GHAS - soft-fail if unavailable.
        if: always() && hashFiles('osv-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3.27.0
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      - name: Upload scan result as artifact
        # Always uploads as artifact - works on private repos without GHAS.
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: osv-results
          path: osv-results.sarif
          if-no-files-found: ignore
          retention-days: 30
